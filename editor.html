<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Pro Maestro - Editor com Colaboração</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #0f0f1a;
        overflow-x: hidden;
    }
    
    /* Sidebar */
    .toggle-sidebar {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1001;
        background: #e94560;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 20px;
    }
    
    #sidebar {
        position: fixed;
        left: -320px;
        top: 0;
        width: 320px;
        height: 100vh;
        background: #1a1a2e;
        color: #eee;
        transition: 0.3s;
        z-index: 1000;
        overflow-y: auto;
    }
    
    #sidebar.active { left: 0; }
    
    .sidebar-content { padding: 20px; }
    .sidebar-content h2 { color: #e94560; margin-bottom: 20px; text-align: center; }
    .sidebar-content button {
        width: 100%;
        margin: 5px 0;
        padding: 10px;
        background: #0f3460;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .sidebar-content button:hover { background: #e94560; }
    
    .menu-categoria { margin: 15px 0; border-top: 1px solid #333; }
    .menu-categoria h4 { padding: 10px 0; cursor: pointer; color: #e94560; }
    .categoria-content { display: none; padding-left: 10px; }
    .menu-categoria.expanded .categoria-content { display: block; }
    
    /* Main */
    #main { margin-left: 0; transition: 0.3s; padding: 20px; }
    #main.sidebar-active { margin-left: 320px; }
    
    .toolbar {
        background: #1a1a2e;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }
    
    .toolbar button {
        background: #0f3460;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
    }
    .toolbar button:hover { background: #e94560; }
    
    .editor-container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
    }
    
    #editor {
        flex: 1;
        min-width: 300px;
        height: 500px;
        padding: 15px;
        background: #1a1a2e;
        color: #eee;
        border: 1px solid #333;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        resize: vertical;
    }
    
    #preview {
        flex: 1;
        min-width: 300px;
        height: 500px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        overflow-y: auto;
    }
    
    /* ========== CSS QUE FUNCIONA PARA PARTITURAS ========== */
    .score svg {
        transform: scale(1.7);
        transform-origin: top left;
        overflow: visible;
    }
    
    /* Move as cifras (acordes) para baixo */
    .score svg .abcjs-chord {
        transform: translate(1px, 30px);
        fill: red;
    }
    
    /* Tamanho das cifras */
    .score svg .abcjs-chord tspan {
        font-size: 24px !important;
        font-weight: bold;
    }
    
    /* Barras de compasso */
    .score svg .abcjs-bar {
        stroke-width: 2px;
        stroke: black;
    }
    
    /* Aproxima o andamento do pentagrama */
    .score svg .abcjs-tempo {
        transform: translate(-48px, 30px);
    }
    
    /* Cores das notas */
    .score svg .abcjs-note {
        fill: #2c3e50;
    }
    
    .chord-notation {
        font-family: monospace;
        line-height: 3;
        margin: 20px 0;
        padding: 10px;
        background: #f8f8f8;
        border-left: 3px solid #e94560;
    }
    
    .lyric { position: relative; display: inline-block; }
    .chord { position: absolute; top: -20px; left: 0; font-weight: bold; }
    
    /* Barra de status online */
    .online-stats {
        background: #0f3460;
        padding: 8px 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
    }
    
    .room-code {
        font-family: monospace;
        background: #1a1a2e;
        padding: 5px 10px;
        border-radius: 5px;
        color: #e94560;
    }
    
    .status {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 8px;
    }
    .status.online { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
    .status.offline { background: #e74c3c; }
    
    .user-count {
        background: #e94560;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
    }
    
    .notification {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: #333;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        z-index: 10000;
        animation: fadeIn 0.3s;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateX(-100%); }
        to { opacity: 1; transform: translateX(0); }
    }
    
    .fullscreen-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #3a86ff;
        color: white;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 24px;
        cursor: pointer;
        z-index: 1000;
    }
    
    @media (max-width: 768px) {
        #main.sidebar-active { margin-left: 0; }
        .editor-container { flex-direction: column; }
    }
</style>
</head>
<body>

<button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>

<div id="sidebar">
    <div class="sidebar-content">
        <h2>🎸 Pro Maestro</h2>
        
        <div class="online-stats" style="background: #0f3460; margin-bottom: 15px;">
            <div><span class="status offline" id="statusDot"></span><span id="statusText">Offline</span></div>
            <div class="user-count" id="userCount">👥 0 online</div>
            <button onclick="copyRoomLink()" style="background: #e94560; padding: 5px 10px;">📋 Copiar Link</button>
        </div>
        
        <button onclick="saveToSupabase()">💾 Salvar</button>
        <button onclick="downloadTXT()">📝 Baixar TXT</button>
        <button onclick="downloadPDF()">📄 Baixar PDF</button>
        
        <div class="menu-categoria collapsed" id="menu-estrutura">
            <h4 onclick="toggleCategoria('menu-estrutura')">📝 Estrutura ▼</h4>
            <div class="categoria-content">
                <button onclick="addFormatacao('# ', '')">H1 Título</button>
                <button onclick="addFormatacao('## ', '')">H2 Título</button>
                <button onclick="addFormatacao('### ', '')">H3 Título</button>
            </div>
        </div>

        <div class="menu-categoria collapsed" id="menu-partituras">
            <h4 onclick="toggleCategoria('menu-partituras')">🎵 Partituras ▼</h4>
            <div class="categoria-content">
                <button onclick="inserirABC()">🎵 Partitura Normal</button>
                <button onclick="inserirABCExemplo()">🎵 Exemplo "Ele é Exaltado"</button>
            </div>
        </div>
    </div>
</div>

<div id="main">
    <div class="toolbar">
        <button onclick="addFormatacao('# ', '')">H1</button>
        <button onclick="addFormatacao('## ', '')">H2</button>
        <button onclick="addFormatacao('**', '**')">B</button>
        <button onclick="addFormatacao('*', '*')">I</button>
        <button onclick="inserirABC()">🎵</button>
        <button onclick="copiarEditor()">📋 Copiar</button>
        <button onclick="colarEditor()">📄 Colar</button>
    </div>

    <div class="editor-container">
        <textarea id="editor" placeholder="Digite seu conteúdo aqui..."></textarea>
        <div id="preview"></div>
    </div>
</div>

<button class="fullscreen-btn" onclick="toggleFullscreenPreview()">⛶</button>

<script>
// =========== SUPABASE CONFIG ==========
const SUPABASE_URL = 'https://unqbbyejjbyiysgvwrrj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVucWJieWVqamJ5aXlzZ3Z3cnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODU1NjMsImV4cCI6MjA5Njk2MTU2M30.l-S9Cb2AnW1gX6iL-7aEghHvnH4ykJ_X7oeNn7z932I';

let supabaseClient = null;
let currentRoomId = null;
let syncTimeout = null;
let isTyping = false;
let userId = null;
let heartbeatInterval = null;

// =========== SUPABASE FUNCTIONS ==========
async function initSupabase() {
    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { error } = await supabaseClient.from('books').select('count', { count: 'exact', head: true });
        if (error) throw error;
        
        updateConnectionStatus(true);
        showNotification('✅ Conectado ao Supabase!', 'success');
        
        // Gerar ID único do usuário
        userId = localStorage.getItem('userId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('userId', userId);
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromURL = urlParams.get('sala');
        
        if (roomFromURL) {
            currentRoomId = roomFromURL;
            await loadRoom(currentRoomId);
        } else {
            await createNewRoom();
        }
        
        // Iniciar heartbeat (atualiza presença a cada 30 segundos)
        startHeartbeat();
        // Buscar contagem de usuários a cada 10 segundos
        setInterval(() => updateUserCount(), 10000);
        
    } catch (error) {
        console.error('Erro:', error);
        updateConnectionStatus(false);
        showNotification('❌ Erro de conexão: ' + error.message, 'error');
    }
}

async function startHeartbeat() {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    
    heartbeatInterval = setInterval(async () => {
        if (currentRoomId && supabaseClient) {
            await supabaseClient
                .from('collaborations')
                .upsert({
                    book_id: currentRoomId,
                    user_name: userId,
                    last_activity: new Date()
                });
        }
    }, 30000);
    
    // Primeiro heartbeat imediato
    if (currentRoomId && supabaseClient) {
        await supabaseClient
            .from('collaborations')
            .upsert({
                book_id: currentRoomId,
                user_name: userId,
                last_activity: new Date()
            });
    }
}

async function updateUserCount() {
    if (!currentRoomId || !supabaseClient) return;
    
    const twoMinutesAgo = new Date(Date.now() - 2 * 60 * 1000);
    const { count, error } = await supabaseClient
        .from('collaborations')
        .select('*', { count: 'exact', head: true })
        .eq('book_id', currentRoomId)
        .gt('last_activity', twoMinutesAgo.toISOString());
    
    if (!error) {
        const userCount = count || 1;
        document.getElementById('userCount').innerHTML = `👥 ${userCount} online`;
    }
}

async function createNewRoom() {
    const newRoomId = Math.random().toString(36).substring(2, 10);
    currentRoomId = newRoomId;
    
    const exampleContent = `# 🎵 Bem-vindo ao Pro Maestro Colaborativo!

[ABC]
X:1
M:4/4
L:1/8
K:C
"C"CDEF GABc | "G7"BAGF E2D2 |]
[/ABC]

Edite este texto e veja a mágica acontecer em tempo real.`;
    
    const { error } = await supabaseClient.from('books').insert([{
        id: currentRoomId,
        content: exampleContent,
        created_at: new Date(),
        updated_at: new Date()
    }]);
    
    if (error) {
        showNotification('❌ Erro ao criar sala: ' + error.message, 'error');
        return;
    }
    
    document.getElementById('editor').value = exampleContent;
    renderizar();
    document.getElementById('roomCode').innerHTML = currentRoomId;
    
    const url = new URL(window.location);
    url.searchParams.set('sala', currentRoomId);
    window.history.pushState({}, '', url);
    
    await setupRealtimeSync();
    showNotification('✨ Sala criada! Compartilhe o link', 'success');
}

async function loadRoom(roomId) {
    const { data, error } = await supabaseClient.from('books').select('content').eq('id', roomId).single();
    
    if (error || !data) {
        showNotification('⚠️ Sala não encontrada, criando nova...', 'info');
        await createNewRoom();
        return;
    }
    
    document.getElementById('editor').value = data.content;
    renderizar();
    document.getElementById('roomCode').innerHTML = roomId;
    await setupRealtimeSync();
    showNotification('📖 Sala carregada!', 'success');
}

async function setupRealtimeSync() {
    const channel = supabaseClient.channel(`sala-${currentRoomId}`)
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'books',
            filter: `id=eq.${currentRoomId}`
        }, (payload) => {
            const newContent = payload.new.content;
            const editor = document.getElementById('editor');
            if (editor.value !== newContent && !isTyping) {
                editor.value = newContent;
                renderizar();
                showNotification('👥 Sincronizado!', 'info');
            }
        })
        .subscribe();
}

async function saveToSupabase() {
    if (!currentRoomId || !supabaseClient) return;
    const content = document.getElementById('editor').value;
    await supabaseClient.from('books').update({ content: content, updated_at: new Date() }).eq('id', currentRoomId);
}

function syncWhileTyping() {
    if (syncTimeout) clearTimeout(syncTimeout);
    isTyping = true;
    syncTimeout = setTimeout(() => { saveToSupabase(); isTyping = false; }, 1000);
}

function copyRoomLink() {
    // Link do visualizador (onde os alunos vão acessar)
    const baseUrl = 'https://albertinosesc.github.io/nplaymusica/visualizador.html';
    const url = `${baseUrl}?sala=${currentRoomId}`;
    
    navigator.clipboard.writeText(url);
    showNotification('📋 Link para alunos copiado! Envie este link para a turma', 'success');
    
    // Opcional: mostrar o link em um alert para confirmar
    console.log('Link copiado:', url);
}

function updateConnectionStatus(connected) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (connected) {
        dot.className = 'status online';
        text.innerHTML = 'Online';
    } else {
        dot.className = 'status offline';
        text.innerHTML = 'Offline';
    }
}

function showNotification(message, type) {
    const div = document.createElement('div');
    div.className = 'notification';
    div.style.background = type === 'error' ? '#e74c3c' : (type === 'info' ? '#3498db' : '#2ecc71');
    div.textContent = message;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

// =========== EDITOR FUNCTIONS ==========
function renderizar() {
    const text = document.getElementById('editor').value;
    const preview = document.getElementById('preview');
    preview.innerHTML = '';
    
    const segments = text.split(/(\[ABC\][\s\S]*?\[\/ABC\]|\[CIFRA[^\]]*\][\s\S]*?\[\/CIFRA\]|\[IMG\][\s\S]*?\[\/IMG\])/g);
    
    segments.forEach(segment => {
        if (segment.startsWith('[ABC]') && segment.endsWith('[/ABC]')) {
            const abcNotation = segment.slice(5, -6).trim();
            const div = document.createElement('div');
            div.className = 'score';
            preview.appendChild(div);
            try {
                ABCJS.renderAbc(div, abcNotation, { responsive: 'resize', staffwidth: 800, scale: 1.5 });
            } catch (e) {
                div.innerHTML = '<p style="color: red">Erro na notação musical ABC</p>';
            }
        } else if (segment.startsWith('[CIFRA') && segment.endsWith('[/CIFRA]')) {
            const cifraDiv = document.createElement('div');
            cifraDiv.className = 'chord-notation';
            const cifraText = segment.slice(segment.indexOf(']') + 1, -8).trim();
            const processedLines = cifraText.split('\n').map(line => {
                return line.replace(/\[([^\]]+)\]([^\[]+)?/g, (match, chord, text) => {
                    text = text || '';
                    return `<span class="lyric"><span class="chord">${chord}</span>${text}</span>`;
                });
            });
            cifraDiv.innerHTML = processedLines.join('\n');
            preview.appendChild(cifraDiv);
        } else if (segment.startsWith('[IMG]') && segment.endsWith('[/IMG]')) {
            const imgData = segment.slice(5, -6).trim();
            const img = document.createElement('img');
            try {
                const imgInfo = JSON.parse(imgData);
                img.src = imgInfo.src;
                img.alt = imgInfo.alt || 'Imagem';
                preview.appendChild(img);
            } catch (e) {
                preview.appendChild(document.createTextNode(segment));
            }
        } else if (segment.trim()) {
            const html = marked.parse(segment);
            const div = document.createElement('div');
            div.innerHTML = html;
            preview.appendChild(div);
        }
    });
}

function addFormatacao(prefixo, sufixo) {
    const editor = document.getElementById('editor');
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const textoSelecionado = editor.value.substring(start, end);
    editor.value = editor.value.substring(0, start) + prefixo + textoSelecionado + sufixo + editor.value.substring(end);
    renderizar();
    syncWhileTyping();
}

function inserirABC() {
    const abcExample = `[ABC]
X:1
M:4/4
L:1/8
K:C
CDEF GABc | BAGF E2D2 |]
[/ABC]\n`;
    const editor = document.getElementById('editor');
    const cursorPos = editor.selectionStart;
    editor.value = editor.value.slice(0, cursorPos) + abcExample + editor.value.slice(editor.selectionEnd);
    renderizar();
    syncWhileTyping();
}

function inserirABCExemplo() {
    const abcExample = `# 🎵 Ele é Exaltado

[ABC]
X:1
T:Ele é Exaltado
C:Adhemar de Campos
M:6/8
L:1/8
K:F stafflines=1
"F"z6 | "F/A"z6 | "Bb"z6 | "Dm"z3 "C/E"z3 | "F"z6 | "F/A"z6 |
"Bb"z3 "C"z3 | "Bb/D"z3 "C/E"z3 | "D/F#"z6 | z6 |:"Gm"z3 "Gm/F"z3 |
"C/E"z3 "C"z3 | "F"z3 "F/A"z3 | "Bb"z3 "F/A"z3 | "Gm"z3 "Gm/F"z3 | "C/E"z3 "C"z3 |
"F"z3 "F/A"z3 | "D4"z3 "D7"z3 | "Gm"z3 "Gm/F"z3 | "C/E"z3 "C"z3 |1 "F"z6 |
z6 :|]2 "F"z3 "F/A"z3 || "D4"z3 "D7"z3 | "Gm"z3 "Gm/F"z3 | "C/E"z3 "C"z3 | 
"F"z3 "F/A"z3 | "D4"z3 "D7"z3 | "Gm"z3 "Gm/F"z3 | "C/E"z3 "C"z3 | "F"z6 | z6 |]
[/ABC]`;
    const editor = document.getElementById('editor');
    const cursorPos = editor.selectionStart;
    editor.value = editor.value.slice(0, cursorPos) + abcExample + editor.value.slice(editor.selectionEnd);
    renderizar();
    syncWhileTyping();
}

function copiarEditor() {
    const editor = document.getElementById('editor');
    editor.select();
    document.execCommand('copy');
    showNotification('✅ Texto copiado!', 'success');
}

function colarEditor() {
    const editor = document.getElementById('editor');
    editor.focus();
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(text => {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
            renderizar();
            syncWhileTyping();
            showNotification('✅ Texto colado!', 'success');
        }).catch(() => {
            const text = prompt('📋 Cole o texto aqui (Ctrl+V):');
            if (text) {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
                renderizar();
                syncWhileTyping();
            }
        });
    }
}

function downloadTXT() {
    const text = document.getElementById('editor').value;
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pro_maestro_${currentRoomId}.txt`;
    a.click();
}

function downloadPDF() {
    const element = document.getElementById('preview');
    const opt = { margin: [10, 10], filename: `pro_maestro_${currentRoomId}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(element).save();
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    sidebar.classList.toggle('active');
    main.classList.toggle('sidebar-active');
}

function toggleCategoria(id) {
    document.getElementById(id).classList.toggle('expanded');
}

function toggleFullscreenPreview() {
    const preview = document.getElementById('preview');
    if (!document.fullscreenElement) {
        preview.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

document.getElementById('editor').addEventListener('input', () => {
    renderizar();
    syncWhileTyping();
});

initSupabase();
</script>
</body>
</html>
