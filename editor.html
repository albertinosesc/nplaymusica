<script>
// =========== SUPABASE CONFIG ==========
const SUPABASE_URL = 'https://unqbbyejjbyiysgvwrrj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVucWJieWVqamJ5aXlzZ3Z3cnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODU1NjMsImV4cCI6MjA5Njk2MTU2M30.l-S9Cb2AnW1gX6iL-7aEghHvnH4ykJ_X7oeNn7z932I';

let supabaseClient = null;
let currentRoomId = null;
let syncTimeout = null;
let isTyping = false;
let userId = null;
let heartbeatInterval = null;

// =========== SUPABASE FUNCTIONS ==========
async function initSupabase() {
    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const { error } = await supabaseClient.from('books').select('count', { count: 'exact', head: true });
        if (error) throw error;
        
        updateConnectionStatus(true);
        showNotification('✅ Conectado ao Supabase!', 'success');
        
        userId = localStorage.getItem('userId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('userId', userId);
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromURL = urlParams.get('sala');
        
        if (roomFromURL) {
            currentRoomId = roomFromURL;
            await loadRoom(currentRoomId);
        } else {
            await createNewRoom();
        }
        
        startHeartbeat();
        setInterval(() => updateUserCount(), 10000);
        
    } catch (error) {
        console.error('Erro:', error);
        updateConnectionStatus(false);
        showNotification('❌ Erro de conexão: ' + error.message, 'error');
    }
}

async function startHeartbeat() {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    
    heartbeatInterval = setInterval(async () => {
        if (currentRoomId && supabaseClient) {
            await supabaseClient
                .from('collaborations')
                .upsert({
                    book_id: currentRoomId,
                    user_name: userId,
                    last_activity: new Date()
                });
        }
    }, 30000);
    
    if (currentRoomId && supabaseClient) {
        await supabaseClient
            .from('collaborations')
            .upsert({
                book_id: currentRoomId,
                user_name: userId,
                last_activity: new Date()
            });
    }
}

async function updateUserCount() {
    if (!currentRoomId || !supabaseClient) return;
    
    const twoMinutesAgo = new Date(Date.now() - 2 * 60 * 1000);
    const { count, error } = await supabaseClient
        .from('collaborations')
        .select('*', { count: 'exact', head: true })
        .eq('book_id', currentRoomId)
        .gt('last_activity', twoMinutesAgo.toISOString());
    
    if (!error) {
        const userCount = count || 1;
        const userCountElement = document.getElementById('userCount');
        if (userCountElement) {
            userCountElement.innerHTML = `👥 ${userCount} online`;
        }
    }
}

async function createNewRoom() {
    const newRoomId = Math.random().toString(36).substring(2, 10);
    currentRoomId = newRoomId;
    
    const exampleContent = `# 🎵 Bem-vindo ao Pro Maestro Colaborativo!

[ABC]
X:1
M:4/4
L:1/8
K:C
"C"CDEF GABc | "G7"BAGF E2D2 |]
[/ABC]

Edite este texto e veja a mágica acontecer em tempo real.`;
    
    const { error } = await supabaseClient.from('books').insert([{
        id: currentRoomId,
        content: exampleContent,
        created_at: new Date(),
        updated_at: new Date()
    }]);
    
    if (error) {
        showNotification('❌ Erro ao criar sala: ' + error.message, 'error');
        return;
    }
    
    const editorElement = document.getElementById('editor');
    const roomCodeElement = document.getElementById('roomCode');
    
    if (editorElement) editorElement.value = exampleContent;
    if (roomCodeElement) roomCodeElement.innerHTML = currentRoomId;
    
    renderizar();
    
    const url = new URL(window.location);
    url.searchParams.set('sala', currentRoomId);
    window.history.pushState({}, '', url);
    
    await setupRealtimeSync();
    showNotification('✨ Sala criada! Compartilhe o link', 'success');
}

async function loadRoom(roomId) {
    const { data, error } = await supabaseClient.from('books').select('content').eq('id', roomId).single();
    
    if (error || !data) {
        showNotification('⚠️ Sala não encontrada, criando nova...', 'info');
        await createNewRoom();
        return;
    }
    
    const editorElement = document.getElementById('editor');
    const roomCodeElement = document.getElementById('roomCode');
    
    if (editorElement) editorElement.value = data.content;
    if (roomCodeElement) roomCodeElement.innerHTML = roomId;
    
    renderizar();
    await setupRealtimeSync();
    showNotification('📖 Sala carregada!', 'success');
}

async function setupRealtimeSync() {
    if (!supabaseClient || !currentRoomId) return;
    
    const channel = supabaseClient.channel(`sala-${currentRoomId}`)
        .on('postgres_changes', {
            event: 'UPDATE',
            schema: 'public',
            table: 'books',
            filter: `id=eq.${currentRoomId}`
        }, (payload) => {
            const newContent = payload.new.content;
            const editor = document.getElementById('editor');
            if (editor && editor.value !== newContent && !isTyping) {
                editor.value = newContent;
                renderizar();
                showNotification('👥 Sincronizado!', 'info');
            }
        })
        .subscribe();
}

async function saveToSupabase() {
    if (!currentRoomId || !supabaseClient) return;
    const content = document.getElementById('editor').value;
    await supabaseClient.from('books').update({ content: content, updated_at: new Date() }).eq('id', currentRoomId);
}

function syncWhileTyping() {
    if (syncTimeout) clearTimeout(syncTimeout);
    isTyping = true;
    syncTimeout = setTimeout(() => { saveToSupabase(); isTyping = false; }, 1000);
}

// =========== FUNÇÃO CORRIGIDA: Copiar link do VISUALIZADOR ==========
function copyRoomLink() {
    const baseUrl = 'https://albertinosesc.github.io/nplaymusica/arquivos/visualizador.html';
    const url = `${baseUrl}?sala=${currentRoomId}`;
    
    navigator.clipboard.writeText(url);
    showNotification('📋 Link para alunos copiado! Envie este link para a turma', 'success');
    console.log('Link copiado:', url);
}

function updateConnectionStatus(connected) {
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (dot) dot.className = connected ? 'status online' : 'status offline';
    if (text) text.innerHTML = connected ? 'Online' : 'Offline';
}

function showNotification(message, type) {
    const div = document.createElement('div');
    div.className = 'notification';
    div.style.background = type === 'error' ? '#e74c3c' : (type === 'info' ? '#3498db' : '#2ecc71');
    div.textContent = message;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

// =========== EDITOR FUNCTIONS ==========
function renderizar() {
    const text = document.getElementById('editor').value;
    const preview = document.getElementById('preview');
    if (!preview) return;
    preview.innerHTML = '';
    
    const segments = text.split(/(\[ABC\][\s\S]*?\[\/ABC\]|\[CIFRA[^\]]*\][\s\S]*?\[\/CIFRA\]|\[IMG\][\s\S]*?\[\/IMG\])/g);
    
    segments.forEach(segment => {
        if (segment.startsWith('[ABC]') && segment.endsWith('[/ABC]')) {
            const abcNotation = segment.slice(5, -6).trim();
            const div = document.createElement('div');
            div.className = 'score';
            preview.appendChild(div);
            try {
                ABCJS.renderAbc(div, abcNotation, { responsive: 'resize', staffwidth: 800, scale: 1.5 });
            } catch (e) {
                div.innerHTML = '<p style="color: red">Erro na notação musical ABC</p>';
            }
        } else if (segment.startsWith('[CIFRA') && segment.endsWith('[/CIFRA]')) {
            const cifraDiv = document.createElement('div');
            cifraDiv.className = 'chord-notation';
            const cifraText = segment.slice(segment.indexOf(']') + 1, -8).trim();
            const processedLines = cifraText.split('\n').map(line => {
                return line.replace(/\[([^\]]+)\]([^\[]+)?/g, (match, chord, text) => {
                    text = text || '';
                    return `<span class="lyric"><span class="chord">${chord}</span>${text}</span>`;
                });
            });
            cifraDiv.innerHTML = processedLines.join('\n');
            preview.appendChild(cifraDiv);
        } else if (segment.startsWith('[IMG]') && segment.endsWith('[/IMG]')) {
            const imgData = segment.slice(5, -6).trim();
            const img = document.createElement('img');
            try {
                const imgInfo = JSON.parse(imgData);
                img.src = imgInfo.src;
                img.alt = imgInfo.alt || 'Imagem';
                preview.appendChild(img);
            } catch (e) {
                preview.appendChild(document.createTextNode(segment));
            }
        } else if (segment.trim()) {
            const html = marked.parse(segment);
            const div = document.createElement('div');
            div.innerHTML = html;
            preview.appendChild(div);
        }
    });
}

function addFormatacao(prefixo, sufixo) {
    const editor = document.getElementById('editor');
    if (!editor) return;
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const textoSelecionado = editor.value.substring(start, end);
    editor.value = editor.value.substring(0, start) + prefixo + textoSelecionado + sufixo + editor.value.substring(end);
    renderizar();
    syncWhileTyping();
}

function inserirLink() {

function inserirImagem() {
    const url = prompt("Digite a URL da imagem:");
    if (url) {
        const imgTag = `<img src="${url}" alt="Imagem" style="max-width:100%">`;
        const editor = document.getElementById('editor');
        const cursorPos = editor.selectionStart;
        editor.value = editor.value.slice(0, cursorPos) + imgTag + editor.value.slice(editor.selectionEnd);
        renderizar();
        syncWhileTyping();

function copiarEditor() {
    const editor = document.getElementById('editor');
    if (!editor) return;
    editor.select();
    document.execCommand('copy');
    showNotification('✅ Texto copiado!', 'success');
}

function colarEditor() {
    const editor = document.getElementById('editor');
    if (!editor) return;
    editor.focus();
    if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(text => {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
            renderizar();
            syncWhileTyping();
            showNotification('✅ Texto colado!', 'success');
        }).catch(() => {
            const text = prompt('📋 Cole o texto aqui (Ctrl+V):');
            if (text) {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
                renderizar();
                syncWhileTyping();
            }
        });
    }
}

function inserirAcordePorNumero() {
    const inputField = document.getElementById('buscaAcordeRapida');
    if (!inputField) return;
    
    const numero = inputField.value;
    if (!numero || numero < 1) {
        alert('Digite um número válido');
        return;
    }
    
    const codigoFinal = `[Acorde:${numero};1]Acorde ${numero}[/Acorde]`;
    const editor = document.getElementById('editor');
    const start = editor.selectionStart;
    editor.value = editor.value.substring(0, start) + codigoFinal + editor.value.substring(start);
    renderizar();
    syncWhileTyping();
    inputField.value = '';
}

function downloadTXT() {
    const text = document.getElementById('editor').value;
    const blob = new Blob([text], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pro_maestro_${currentRoomId}.txt`;
    a.click();
}

function downloadPDF() {
    const element = document.getElementById('preview');
    const opt = { margin: [10, 10], filename: `pro_maestro_${currentRoomId}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(element).save();
}

function exportHTML() {
    const content = document.getElementById('preview').innerHTML;
    const html = `<!DOCTYPE html><html><head><title>Pro Maestro</title><script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"><\/script><style>body{margin:20px;font-family:Arial}.score{margin:20px 0}img{max-width:100%}</style></head><body>${content}</body></html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pro_maestro_${currentRoomId}.html`;
    a.click();
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    if (sidebar) sidebar.classList.toggle('active');
    if (main) main.classList.toggle('sidebar-active');
}

function toggleCategoria(id) {
    const element = document.getElementById(id);
    if (element) element.classList.toggle('expanded');
}

function toggleFullscreenPreview() {
    const preview = document.getElementById('preview');
    if (!document.fullscreenElement) {
        preview.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

// Event listener
const editorElement = document.getElementById('editor');
if (editorElement) {
    editorElement.addEventListener('input', () => {
        renderizar();
        syncWhileTyping();
    });
}

// Iniciar
initSupabase();
