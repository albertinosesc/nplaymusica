<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Musical - Colaboração</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; }
        .editor-column, .preview-column { flex: 1; min-width: 300px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .toolbar { padding: 10px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #45a049; }
        #editor { width: 100%; height: 500px; padding: 15px; border: none; resize: none; font-family: monospace; font-size: 14px; }
        #preview { padding: 15px; height: 500px; overflow-y: auto; }
        .notification { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; z-index: 10000; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        .room-code { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; font-family: monospace; }
        .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status.online { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
        .status.offline { background: #f87171; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 Editor Mddad</h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div class="room-code">📚 Sala: <strong id="roomCode">---</strong></div>
            <div><span class="status offline" id="statusDot"></span><span id="statusText">Offline</span></div>
            <button onclick="copyLink()">📋 Copiar Link</button>
            <button onclick="novaSala()">➕ Nova Sala</button>
        </div>
    </div>
    <div class="container">
        <div class="editor-column">
            <div class="toolbar"><button onclick="salvar()">💾 Salvar</button><button onclick="limpar()">🗑️ Limpar</button></div>
            <textarea id="editor" placeholder="Digite seu texto aqui..."></textarea>
        </div>
        <div class="preview-column">
            <div class="toolbar"><button onclick="atualizarPreview()">🔄 Atualizar</button></div>
            <div id="preview"></div>
        </div>
    </div>

    <script>
        // =========== SUAS CREDENCIAIS CORRETAS ==========
        const SUPABASE_URL = 'https://unqbbyejjbyiysgvwrrj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVucWJieWVqamJ5aXlzZ3Z3cnJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODU1NjMsImV4cCI6MjA5Njk2MTU2M30.l-S9Cb2AnW1gX6iL-7aEghHvnH4ykJ_X7oeNn7z932I';
        
        let supabase;
        let salaId = null;
        let temporizador = null;
        let digitando = false;
        
        async function iniciar() {
            try {
                mostrarNotificacao('🟡 Conectando...', 'info');
                
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                // Teste de conexão
                const { error } = await supabase.from('books').select('count', { count: 'exact', head: true });
                if (error) throw error;
                
                document.getElementById('statusDot').className = 'status online';
                document.getElementById('statusText').innerHTML = 'Online';
                mostrarNotificacao('✅ Conectado!', 'success');
                
                // Verificar sala na URL
                const params = new URLSearchParams(window.location.search);
                const sala = params.get('sala');
                
                if (sala) {
                    salaId = sala;
                    await carregarSala(salaId);
                } else {
                    await novaSala();
                }
            } catch (erro) {
                console.error(erro);
                document.getElementById('statusDot').className = 'status offline';
                document.getElementById('statusText').innerHTML = 'Offline';
                mostrarNotificacao('❌ Erro de conexão: ' + erro.message, 'error');
            }
        }
        
        async function novaSala() {
            const novaId = Math.random().toString(36).substring(2, 10);
            salaId = novaId;
            
            const conteudoExemplo = `🎵 EDITOR COLABORATIVO FUNCIONANDO!

[ABC]
X:1
M:4/4
L:1/8
K:C
CDEF GABc | BAGF E2D2 |]
[/ABC]

✨ Edite este texto em tempo real!
Compartilhe o link com seus amigos.`;
            
            const { error } = await supabase.from('books').insert([{
                id: salaId,
                content: conteudoExemplo,
                created_at: new Date(),
                updated_at: new Date()
            }]);
            
            if (error) {
                mostrarNotificacao('❌ Erro ao criar sala: ' + error.message, 'error');
                return;
            }
            
            document.getElementById('editor').value = conteudoExemplo;
            atualizarPreview();
            document.getElementById('roomCode').innerHTML = salaId;
            
            // Atualizar URL
            const url = new URL(window.location);
            url.searchParams.set('sala', salaId);
            window.history.pushState({}, '', url);
            
            await configurarSincronizacao();
            mostrarNotificacao('✨ Sala criada! Compartilhe o link', 'success');
        }
        
        async function carregarSala(id) {
            const { data, error } = await supabase.from('books').select('content').eq('id', id).single();
            
            if (error || !data) {
                mostrarNotificacao('⚠️ Sala não encontrada, criando nova...', 'info');
                await novaSala();
                return;
            }
            
            document.getElementById('editor').value = data.content;
            atualizarPreview();
            document.getElementById('roomCode').innerHTML = id;
            await configurarSincronizacao();
            mostrarNotificacao('📖 Sala carregada!', 'success');
        }
        
        async function configurarSincronizacao() {
            const canal = supabase.channel(`sala-${salaId}`)
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'books',
                    filter: `id=eq.${salaId}`
                }, (payload) => {
                    const novoConteudo = payload.new.content;
                    const editor = document.getElementById('editor');
                    if (editor.value !== novoConteudo && !digitando) {
                        editor.value = novoConteudo;
                        atualizarPreview();
                        mostrarNotificacao('👥 Sincronizado!', 'info');
                    }
                })
                .subscribe();
        }
        
        async function salvar() {
            if (!salaId) return;
            const conteudo = document.getElementById('editor').value;
            const { error } = await supabase.from('books').update({ content: conteudo, updated_at: new Date() }).eq('id', salaId);
            if (error) console.error('Erro ao salvar:', error);
        }
        
        function aoDigitar() {
            atualizarPreview();
            if (temporizador) clearTimeout(temporizador);
            digitando = true;
            temporizador = setTimeout(() => { salvar(); digitando = false; }, 1000);
        }
        
        function atualizarPreview() {
            const texto = document.getElementById('editor').value;
            const preview = document.getElementById('preview');
            preview.innerHTML = `<pre style="white-space: pre-wrap; font-family: monospace; font-size: 14px;">${escapeHtml(texto)}</pre>`;
        }
        
        function escapeHtml(texto) {
            return texto.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function copyLink() {
            const url = `${window.location.origin}${window.location.pathname}?sala=${salaId}`;
            navigator.clipboard.writeText(url);
            mostrarNotificacao('📋 Link copiado!', 'success');
        }
        
        function limpar() {
            if (confirm('Tem certeza?')) {
                document.getElementById('editor').value = '';
                atualizarPreview();
                salvar();
            }
        }
        
        function mostrarNotificacao(msg, tipo) {
            const div = document.createElement('div');
            div.className = 'notification';
            div.style.background = tipo === 'error' ? '#dc3545' : (tipo === 'info' ? '#2196F3' : '#4CAF50');
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        document.getElementById('editor').addEventListener('input', aoDigitar);
        iniciar();
    </script>
</body>
</html>
